# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  GREETING: こんにちは！

tasks:
  default:
    desc: 挨拶します。
    cmds:
      - echo "{{.GREETING}}"
    silent: true
  
  dev-up:
    desc: 開発環境プロファイルでdocker-composeを起動します。
    cmds:
      - docker compose --profile dev up

  dev-down:
    desc: 開発環境プロファイルでdocker-composeを停止します。
    cmds:
      - docker compose --profile dev down