name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Backup DB
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            mkdir -p ~/backups
            docker exec kasa-blog-mysql sh -c \
              'mysqldump -uroot -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE"' \
              > ~/backups/dump_$(date +%Y%m%d_%H%M%S).sql
            # 直近10件を残して古いバックアップを削除
            ls -t ~/backups/dump_*.sql 2>/dev/null | tail -n +11 | xargs -r rm

  deploy:
    runs-on: ubuntu-latest
    needs: backup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env.prod
        run: printf '%s' "$ENV_PROD" > .env.prod
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}

      - name: Build and push
        run: |
          docker compose --env-file .env.prod --profile prod build
          docker compose --env-file .env.prod --profile prod push

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd kasa-blog-app
            task prod-deploy
